{% extends 'base.html' %}

{% block title %}{{ title }} – MediTrack{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg" style="border-radius: 1.5rem; overflow: hidden;">
            <div class="card-header bg-primary bg-gradient text-white p-4 border-0 text-center">
                <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-25 rounded-circle mb-3" style="width: 64px; height: 64px;">
                    <i class="bi bi-pencil-square fs-2"></i>
                </div>
                <h3 class="fw-bold mb-0">{{ title }}</h3>
            </div>
            <div class="card-body p-4 p-md-5 bg-white">
                
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-4">
                        <label for="{{ field.id_for_label }}" class="form-label fw-bold text-muted small text-uppercase letter-spacing-wide">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
                        {{ field }}
                        {% if field.help_text %}<div class="form-text">{{ field.help_text }}
            </div>
        </div>
    </div>
</div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

services:
  # ── Django / Gunicorn ──────────────────────────────────
  web:
    build: .
    container_name: meditrack_web
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
    networks:
      - meditrack_net

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: meditrack_db
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-meditrack}
      POSTGRES_USER: ${DATABASE_USER:-meditrack}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-meditrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meditrack_net

  # ── Nginx ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: meditrack_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - meditrack_net

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  meditrack_net:
    driver: bridge
